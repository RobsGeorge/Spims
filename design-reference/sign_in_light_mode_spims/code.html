<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Spims - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed-dim": "#eac166",
                        "surface-container-low": "#eff4ff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#ffd578",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-dim": "#cbdbf6",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-container": "#795a03",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#d4af37",
                        "outline-variant": "#dbc0c4",
                        "tertiary-container": "#003415",
                        "tertiary": "#001d09",
                        "inverse-surface": "#213146",
                        "inverse-primary": "#ffb1c1",
                        "on-surface-variant": "#554245",
                        "on-surface": "#0b1c30",
                        "surface-container-highest": "#d3e3ff",
                        "surface-variant": "#d3e3ff",
                        "surface-container-high": "#dde9ff",
                        "on-tertiary-container": "#6d9f76",
                        "on-primary-fixed": "#3f0017",
                        "primary-fixed": "#ffd9df",
                        "on-secondary-fixed": "#251a00",
                        "tertiary-fixed": "#bbefc1",
                        "secondary": "#785a02",
                        "on-primary-container": "#e26f8b",
                        "surface-tint": "#a03b57",
                        "primary": "#380014",
                        "on-tertiary-fixed-variant": "#21502e",
                        "on-secondary-fixed-variant": "#5b4300",
                        "background": "#f8f9ff",
                        "on-tertiary-fixed": "#00210b",
                        "surface": "#f8f9ff",
                        "on-primary-fixed-variant": "#812340",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#5d0326",
                        "secondary-fixed": "#ffdf9c",
                        "surface-container": "#e6eeff",
                        "outline": "#887175",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#9fd3a6",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-background": "#0b1c30",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "2xl": "3rem",
                        "xs": "0.25rem",
                        "xl": "2rem",
                        "md": "1rem",
                        "lg": "1.5rem",
                        "sm": "0.5rem",
                        "sidebar-width": "280px",
                        "container-max": "1440px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    },
                    "boxShadow": {
                        "soft": "0px 4px 20px rgba(0,0,0,0.05)"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-md md:p-xl font-body-md text-on-surface">
<!-- Top Corner Actions (Language Switcher) -->
<div class="absolute top-lg right-lg flex gap-md z-50">
<button aria-label="Language Switcher" class="p-sm rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="language">language</span>
</button>
<button aria-label="Help" class="p-sm rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
<!-- Main Split Layout Container -->
<main class="w-full max-w-5xl bg-surface-container-lowest rounded-xl shadow-soft overflow-hidden flex flex-col md:flex-row relative">
<!-- Left Panel: Brand & Motif -->
<div class="w-full md:w-5/12 bg-primary text-on-primary p-xl flex flex-col justify-between relative overflow-hidden hidden md:flex">
<!-- Subtle Geometric Background Motif -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 10% 20%, #ffffff 1px, transparent 1px), radial-gradient(circle at 90% 80%, #ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
<!-- Large Logo Graphic Placeholder -->
<div class="absolute -bottom-20 -left-20 opacity-5">
<span class="material-symbols-outlined text-[300px]" data-icon="account_balance">account_balance</span>
</div>
<!-- Brand Header -->
<div class="relative z-10">
<h1 class="font-display-lg text-display-lg mb-sm">Spims</h1>
<p class="font-headline-md text-headline-md text-on-primary/80 font-normal">Academic Excellence</p>
</div>
<!-- Welcome Message -->
<div class="relative z-10 mt-auto">
<p class="font-headline-lg text-headline-lg mb-md leading-tight">Enter the hushed halls of knowledge.</p>
<div class="h-1 w-16 bg-secondary-fixed-dim rounded-full"></div>
</div>
</div>
<!-- Right Panel: Sign In Form -->
<div class="w-full md:w-7/12 p-lg md:p-2xl flex flex-col justify-center bg-surface-container-lowest">
<!-- Mobile Brand Header (Visible only on small screens) -->
<div class="md:hidden mb-xl text-center">
<h1 class="font-display-lg text-display-lg text-primary mb-sm">Spims</h1>
<p class="font-headline-md text-headline-md text-on-surface-variant font-normal">Enter the hushed halls of knowledge.</p>
</div>
<div class="max-w-md w-full mx-auto">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-xl">Sign In</h2>
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-2xl pr-md py-md bg-surface border border-outline-variant/50 rounded text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body-md" id="email" name="email" placeholder="scholar@institution.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-2xl pr-md py-md bg-surface border border-outline-variant/50 rounded text-on-surface focus:ring-1 focus:ring-primary focus:border-primary transition-all font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between pt-sm">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded-sm bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-sm block font-body-md text-body-md text-on-surface-variant" for="remember-me">
                                Remember Me
                            </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">
                                Forgot Password?
                            </a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-md">
<button class="w-full flex justify-center py-md px-lg border border-transparent rounded-full shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transform active:scale-95 transition-all" type="submit">
                            Sign In
                        </button>
</div>
</form>
<!-- Footer Links -->
<div class="mt-xl pt-lg border-t border-outline-variant/30 text-center flex flex-col space-y-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                        New to Spims? 
                        <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Register</a>
</p>
<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Reset Account</a>
</div>
</div>
</div>
</main>
</body></html>
