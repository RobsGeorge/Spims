<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    if (e.target.value.length === 1) {
                        if (index < inputs.length - 1) {
                            inputs[index + 1].disabled = false;
                            inputs[index + 1].focus();
                        }
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value) {
                        if (index > 0) {
                            inputs[index - 1].focus();
                            inputs[index - 1].value = '';
                        }
                    }
                });

                // Allow pasting
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').slice(0, 6).split('');
                    if (/^\d+$/.test(pastedData.join(''))) {
                        pastedData.forEach((char, i) => {
                            if (inputs[i]) {
                                inputs[i].disabled = false;
                                inputs[i].value = char;
                            }
                        });
                        const nextFocus = Math.min(pastedData.length, inputs.length - 1);
                        inputs[nextFocus].disabled = false;
                        inputs[nextFocus].focus();
                    }
                });
            });

            // Focus first input on load
            if(inputs[0]) {
                setTimeout(() => inputs[0].focus(), 100);
            }

            // Simple countdown timer
            let timeLeft = 59;
            const countdownEl = document.getElementById('countdown');
            const resendBtn = document.getElementById('resend-btn');

            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = `0:${timeLeft < 10 ? '0' : ''}${timeLeft}`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    countdownEl.parentElement.style.display = 'none';
                    resendBtn.disabled = false;
                    resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }, 1000);
        });
    </script>
