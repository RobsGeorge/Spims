<!DOCTYPE html>

<html class="light" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>إنشاء حساب - Spims</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#001d09",
                        "outline-variant": "#dbc0c4",
                        "on-error": "#ffffff",
                        "tertiary-container": "#003415",
                        "surface": "#f8f9ff",
                        "on-background": "#0b1c30",
                        "on-surface-variant": "#554245",
                        "primary-fixed-dim": "#d4af37",
                        "on-primary": "#ffffff",
                        "secondary-container": "#ffd578",
                        "on-tertiary-container": "#6d9f76",
                        "on-primary-container": "#e26f8b",
                        "secondary": "#785a02",
                        "surface-container-highest": "#d3e3ff",
                        "on-secondary-container": "#795a03",
                        "surface-container": "#e6eeff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed": "#00210b",
                        "outline": "#887175",
                        "on-secondary-fixed": "#251a00",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#eac166",
                        "surface-container-high": "#dde9ff",
                        "on-primary-fixed": "#3f0017",
                        "surface-variant": "#d3e3ff",
                        "primary-container": "#5d0326",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#812340",
                        "secondary-fixed": "#ffdf9c",
                        "surface-tint": "#a03b57",
                        "inverse-on-surface": "#ebf1ff",
                        "on-tertiary-fixed-variant": "#21502e",
                        "surface-bright": "#f8f9ff",
                        "inverse-surface": "#213146",
                        "primary": "#380014",
                        "inverse-primary": "#ffb1c1",
                        "background": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "on-surface": "#0b1c30",
                        "on-secondary-fixed-variant": "#5b4300",
                        "primary-fixed": "#ffd9df",
                        "tertiary-fixed": "#bbefc1",
                        "surface-dim": "#cbdbf6",
                        "surface-container-low": "#eff4ff",
                        "tertiary-fixed-dim": "#9fd3a6",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "md": "1rem",
                        "sidebar-width": "280px",
                        "sm": "0.5rem",
                        "lg": "1.5rem",
                        "xs": "0.25rem",
                        "xl": "2rem",
                        "container-max": "1440px",
                        "2xl": "3rem"
                    },
                    "fontFamily": {
                        "headline-md": ["Cairo", "Inter", "sans-serif"],
                        "label-md": ["Cairo", "Inter", "sans-serif"],
                        "body-md": ["Cairo", "Inter", "sans-serif"],
                        "headline-lg": ["Cairo", "Inter", "sans-serif"],
                        "display-lg": ["Cairo", "Inter", "sans-serif"],
                        "label-sm": ["Cairo", "Inter", "sans-serif"],
                        "body-lg": ["Cairo", "Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]
                    },
                    "boxShadow": {
                        "soft": "0px 4px 20px rgba(0,0,0,0.05)"
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-background min-h-screen flex text-on-surface antialiased">
<!-- Split Screen Layout -->
<div class="flex w-full min-h-screen flex-col lg:flex-row">
<!-- Left Side: Registration Card (Mirrored, so visually right on desktop due to RTL) -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-gutter relative bg-surface-container-low order-2 lg:order-1">
<!-- Language Switcher (Top Left in RTL context means visually right if absolute, but we want it Top Right visually in RTL which is 'start') -->
<div class="absolute top-gutter left-gutter">
<button class="flex items-center gap-sm text-primary font-label-md text-label-md hover:bg-surface-variant p-sm rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="language">language</span>
<span>English</span>
</button>
</div>
<!-- Card Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-lg p-lg shadow-soft border border-outline-variant/30">
<div class="mb-xl text-center">
<h1 class="font-headline-lg text-headline-lg text-primary mb-sm">إنشاء حساب جديد</h1>
<p class="font-body-md text-body-md text-on-surface-variant">أدخل تفاصيلك للبدء</p>
</div>
<form class="space-y-md">
<!-- Name Fields (Split) -->
<div class="flex flex-col sm:flex-row gap-md">
<div class="w-full">
<label class="block font-label-md text-label-md text-on-surface mb-xs">الاسم الأول</label>
<input class="w-full bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none px-md py-sm font-body-md text-body-md text-on-surface transition-all" placeholder="أحمد" type="text"/>
</div>
<div class="w-full">
<label class="block font-label-md text-label-md text-on-surface mb-xs">اسم العائلة</label>
<input class="w-full bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none px-md py-sm font-body-md text-body-md text-on-surface transition-all" placeholder="محمود" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs">البريد الإلكتروني</label>
<input class="w-full bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none px-md py-sm font-body-md text-body-md text-on-surface text-left dir-ltr transition-all" placeholder="email@example.com" type="email"/>
</div>
<!-- Phone Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs">رقم الهاتف</label>
<input class="w-full bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none px-md py-sm font-body-md text-body-md text-on-surface text-left dir-ltr transition-all" placeholder="+20 123 456 7890" type="tel"/>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs">كلمة المرور</label>
<input class="w-full bg-surface-bright border border-outline-variant rounded focus:border-primary focus:ring-1 focus:ring-primary outline-none px-md py-sm font-body-md text-body-md text-on-surface text-left dir-ltr transition-all" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md rounded-full py-md mt-lg hover:bg-primary-container hover:text-on-primary-container active:scale-95 transition-all shadow-soft flex justify-center items-center gap-sm" type="button">
<span>إنشاء حساب</span>
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</form>
<!-- Login Link -->
<div class="mt-xl text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        لديك حساب بالفعل؟ 
                        <a class="text-primary font-label-md text-label-md hover:underline transition-all" href="#">تسجيل الدخول</a>
</p>
</div>
</div>
</div>
<!-- Right Side: Brand Panel (Mirrored, so visually left on desktop due to RTL) -->
<div class="w-full lg:w-1/2 bg-primary flex flex-col items-center justify-center p-xl relative overflow-hidden order-1 lg:order-2">
<!-- Abstract decorative elements -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at 50% 50%, #ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
<div class="relative z-10 text-center max-w-lg">
<!-- Spims Logo -->
<div class="mb-xl flex justify-center">
<div class="w-24 h-24 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-soft">
<span class="font-display-lg text-display-lg text-primary">S</span>
</div>
</div>
<h2 class="font-display-lg text-display-lg text-on-primary mb-md leading-tight">
                    ابدأ رحلتك الأكاديمية في الدراسات القبطية الأرثوذكسية
                </h2>
<p class="font-body-lg text-body-lg text-primary-fixed-dim mt-md">
                    نقدم تعليماً متميزاً يجمع بين الأصالة الأكاديمية والتراث الروحي العريق. انضم إلى مجتمعنا اليوم.
                </p>
</div>
<!-- Subtle bottom accent -->
<div class="absolute bottom-0 left-0 right-0 h-1 bg-primary-fixed-dim"></div>
</div>
</div>
</body></html>
