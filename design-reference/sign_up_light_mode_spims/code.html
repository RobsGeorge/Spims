<p class="font-body-md text-body-md text-on-surface-variant">Join Sacred Academic to begin your studies.</p>
</div>
<form class="space-y-lg">
<div class="flex flex-col md:flex-row gap-md">
<div class="flex-1 space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="firstName">First Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" id="firstName" name="firstName" placeholder="John" type="text"/>
</div>
<div class="flex-1 space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="lastName">Last Name</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" id="lastName" name="lastName" placeholder="Doe" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" id="email" name="email" placeholder="john.doe@example.com" type="email"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="phone">Phone Number</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md text-on-surface placeholder:text-outline" id="phone" name="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-DEFAULT px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md text-on-surface placeholder:text-outline pr-xl" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-on-primary rounded-full py-md font-label-md text-label-md hover:bg-primary/90 active:scale-95 transition-all shadow-soft mt-xl" type="submit">
