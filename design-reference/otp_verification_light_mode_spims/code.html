<script>
        // Simple OTP input logic
        const inputs = document.querySelectorAll('#otp-form input[type="text"]');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Ensure only numbers
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                
                // Auto advance
                if (e.target.value !== '' && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                // Backspace logic
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Paste logic
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                pastedData.split('').forEach((char, i) => {
                    if(inputs[i]) {
                        inputs[i].value = char;
                        if(i < 5) inputs[i+1].focus();
                    }
                });
            });
        });

        // Simple countdown logic
        let timeLeft = 59;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            timeLeft--;
            if(timeLeft < 0) {
                clearInterval(timer);
                countdownEl.parentElement.disabled = false;
                countdownEl.parentElement.innerHTML = "Resend code now";
            } else {
                const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                countdownEl.innerText = `0:${seconds}`;
            }
        }, 1000);
    </script>
