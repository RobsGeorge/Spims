<span class="material-symbols-outlined text-secondary text-[48px] mb-4" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                        lock_reset
                    </span>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2 font-headline-lg md:font-headline-lg">Reset Password</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email address and we will send you a link to securely reset your password.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="email">Email Address</label>
<input class="input-academic w-full py-3 px-2 font-body-md text-body-md placeholder-on-surface-variant/50 transition-colors duration-200" id="email" name="email" placeholder="scholar@spims.edu" required="" type="email"/>
</div>
<div class="pt-4">
<button class="w-full flex justify-center py-4 px-4 border border-transparent rounded bg-secondary text-on-secondary font-label-md text-label-md hover:bg-secondary-fixed-dim focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary transition-colors duration-200 shadow-md" type="submit">

                        </button>
</div>
</form>

<a class="inline-flex items-center font-label-md text-label-md text-on-surface-variant hover:text-secondary transition-colors duration-200 group" href="#">
